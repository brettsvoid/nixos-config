# gitleaks configuration tuned for nix flakes.
#
# Strategy:
#   - Inherit the upstream default ruleset (covers AWS, GitHub, OpenAI,
#     Anthropic, GCP, Stripe, generic high-entropy, etc.)
#   - Add nix-specific allowlists so flake.lock narHashes, nix store paths,
#     and SSH public keys don't trip false positives
#   - Add custom rules for the things the default set misses

title = "brettsvoid/nixos-config"

[extend]
useDefault = true

# ─── Allowlist: legitimate nix-shaped strings ─────────────────────────────
# These look high-entropy but are public-by-design.
[[allowlists]]
description = "nix store hashes / narHashes / public keys"
regexes = [
  # nix store paths (32-char base32 hash + name)
  '''/nix/store/[0-9a-z]{32}-[A-Za-z0-9._+\-]+''',
  # narHash format: sha256-<base64>= or sha256:<hex>
  '''sha256[-:][A-Za-z0-9+/=]{43,}=?''',
  '''sha512[-:][A-Za-z0-9+/=]{86,}=?''',
  # ssh-ed25519 / ssh-rsa public keys (signature-shaped but public)
  '''ssh-(rsa|ed25519|ecdsa-sha2-nistp[0-9]+) +AAAA[A-Za-z0-9+/=]+''',
  # PGP fingerprints (16 or 40 hex chars in PGP context)
  '''[0-9A-F]{40}''',
  # Git commit SHAs in flake.lock / commit messages
  '''[0-9a-f]{40}''',
  # Generic 32-char base32 (very common in nix)
  '''(?i)\b[a-z0-9]{32}\b''',
]
paths = [
  '''flake\.lock''',
  '''.*\.lock$''',
]

# ─── Allowlist: paths that are inherently public ──────────────────────────
[[allowlists]]
description = "files that contain public-key material by design"
paths = [
  # Phase A.5b: secrets registry holds public keys (decryption recipients)
  '''.*/secrets\.nix$''',
  # nvim plugin lockfiles
  '''lazy-lock\.json$''',
  # GitHub workflows reference run-tokens but those are ephemeral
  '''\.github/workflows/.*\.yml$''',
]

# ─── Custom rules: catch things the default misses ────────────────────────

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API key (sk-ant-*)"
regex = '''sk-ant-[A-Za-z0-9_\-]{20,}'''
keywords = ["sk-ant-"]

[[rules]]
id = "openai-api-key"
description = "OpenAI API key (sk-*)"
regex = '''sk-[A-Za-z0-9]{32,}'''
keywords = ["sk-"]

[[rules]]
id = "bws-access-token"
description = "Bitwarden Secrets Manager access token (0_*)"
regex = '''0\.[0-9a-f\-]{36}\.[A-Za-z0-9_\-]{40,}:[A-Za-z0-9_\-]{40,}'''
keywords = ["BWS_ACCESS_TOKEN", "bws"]

[[rules]]
id = "private-ssh-key-block"
description = "PEM-encoded private key block"
regex = '''-----BEGIN (OPENSSH|RSA|EC|DSA|PGP|ENCRYPTED) PRIVATE KEY-----'''

[[rules]]
id = "age-private-key"
description = "Age private key (AGE-SECRET-KEY-*)"
regex = '''AGE-SECRET-KEY-1[0-9A-Z]{50,}'''
keywords = ["AGE-SECRET-KEY-"]

[[rules]]
id = "aws-secret-access-key-blob"
description = "Inline AWS secret access key"
regex = '''(?i)aws_secret_access_key[\s=:]+["']?[A-Za-z0-9/+=]{40}["']?'''
keywords = ["aws_secret_access_key"]

# ─── Low-entropy infra identifiers the default ruleset ignores ────────────
# These are what leaked once before: an EC2 instance ID and a hardcoded
# server IP. gitleaks' entropy-based rules skip them because they aren't
# high-entropy secrets — so they need explicit rules. No keywords: the
# regexes run against all content so nothing slips by on a fast-path miss.

[[rules]]
id = "aws-ec2-instance-id"
description = "AWS EC2 instance ID (i-*) — infra identifier, not a high-entropy secret"
regex = '''\bi-(?:[0-9a-f]{17}|[0-9a-f]{8})\b'''

[[rules]]
id = "hardcoded-ipv4"
description = "Hardcoded IPv4 address — catches internal/topology-revealing IPs"
# Octet-validated (0-255) so version strings like 1.2.3.999 don't match.
regex = '''\b(?:(?:25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])\.){3}(?:25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])\b'''
# RFC-1918 private ranges (10/8, 172.16/12, 192.168/16) are intentionally
# NOT allowlisted — in a public repo they reveal internal topology and are
# exactly what we want flagged. Only universally-safe IPs are excepted.
[[rules.allowlists]]
description = "IPs that are safe to commit"
regexes = [
  '''\b127\.\d{1,3}\.\d{1,3}\.\d{1,3}\b''', # loopback
  '''\b0\.0\.0\.0\b''',                      # unspecified / bind-all
  '''\b255\.255\.255\.255\b''',              # broadcast
  '''\b169\.254\.\d{1,3}\.\d{1,3}\b''',      # link-local
  '''\b192\.0\.2\.\d{1,3}\b''',              # RFC 5737 TEST-NET-1 (docs)
  '''\b198\.51\.100\.\d{1,3}\b''',           # RFC 5737 TEST-NET-2 (docs)
  '''\b203\.0\.113\.\d{1,3}\b''',            # RFC 5737 TEST-NET-3 (docs)
]
