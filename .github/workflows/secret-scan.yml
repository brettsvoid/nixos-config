# Backstop scanning. Runs even if a developer used `git commit --no-verify`
# to bypass local pre-commit hooks. Blocks merges to main if anything fires.
name: secret-scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks (full history)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for gitleaks detect

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  semgrep:
    name: semgrep (custom rules + auto)
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run semgrep (custom rules)
        run: semgrep --config .semgrep.yml --error --quiet .

      - name: Run semgrep auto (community rulesets)
        run: semgrep --config auto --error --quiet --severity ERROR .

  pre-commit:
    name: pre-commit (nix flake check)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Run pre-commit hooks via flake build
        # Builds only the pre-commit derivation. Avoids `nix flake check`
        # which would also try to build all nixosConfigurations on the runner
        # (slow and not what we want here).
        run: |
          nix build .#checks.x86_64-linux.pre-commit \
            --print-build-logs --no-link
