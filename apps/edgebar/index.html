<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>edgebar</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <!-- screen frame is drawn natively (src-tauri); this window is just the bar -->
    <!-- top bar: workspaces + front app left, notch center, status + clock right -->
    <div class="bar">
      <div class="cluster left">
        <!-- workspaces pill: ⌘ launcher menu on the left, then the dots -->
        <div class="pill" id="workspaces">
          <button class="launcher-icon" id="launcher-btn" title="Menu">󰘳</button>
          <div class="ws-dots"></div>
          <div class="menu-panel">
            <button class="menu-item" data-action="settings">
              <span class="mi-icon">󰒓</span><span>Settings</span>
            </button>
            <button class="menu-item" data-action="activity">
              <span class="mi-icon">󱕍</span><span>Activity Monitor</span>
            </button>
            <button class="menu-item" data-action="sleep">
              <span class="mi-icon">󰌾</span><span>Sleep</span>
            </button>
          </div>
        </div>
      </div>
      <div class="cluster center">
        <div class="pill" id="notch">
          <div class="notch-row">
            <span class="notch-handle"></span>
          </div>
          <div class="notch-panel-clip">
            <div class="notch-panel">
              <div class="big-time">--:--:--</div>
              <div class="full-date">—</div>
              <!-- Metrics: lazy-polled only while the notch is open (ambxst style) -->
              <div class="metrics">
                <div class="metric" data-k="cpu">
                  <span class="m-icon">󰘚</span>
                  <span class="m-bar"><i></i></span>
                  <span class="m-val">—</span>
                </div>
                <div class="metric" data-k="mem">
                  <span class="m-icon">󰓅</span>
                  <span class="m-bar"><i></i></span>
                  <span class="m-val">—</span>
                </div>
                <div class="metric" data-k="disk">
                  <span class="m-icon">󰋊</span>
                  <span class="m-bar"><i></i></span>
                  <span class="m-val">—</span>
                </div>
                <div class="metric" data-k="swap">
                  <span class="m-icon">󰁯</span>
                  <span class="m-bar"><i></i></span>
                  <span class="m-val">—</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="cluster right">
        <!-- Controls: a small detached button with a floating sliders popup -->
        <div class="pill detached" id="controls">
          <button class="ctl-icon" id="ctl-btn" title="Adjustments">󰘮</button>
          <div class="ctl-panel">
            <div class="slider-row" data-k="volume">
              <span class="s-icon">󰕾</span>
              <input class="s-range" type="range" min="0" max="100" value="0" />
            </div>
            <div class="slider-row" data-k="mic">
              <span class="s-icon">󰍬</span>
              <input class="s-range" type="range" min="0" max="100" value="0" />
            </div>
            <div class="slider-row" data-k="brightness">
              <span class="s-icon">☀</span>
              <input class="s-range" type="range" min="0" max="100" value="0" />
            </div>
          </div>
        </div>
        <!-- Wi-Fi / network + battery, merged into one detached pill -->
        <div class="pill detached" id="status">
          <span class="stat-grp" id="wifi">
            <span class="wifi-icon">󰖪</span>
            <span class="wifi-label">—</span>
          </span>
          <span class="stat-grp" id="battery">
            <span class="bat-icon">󰂎</span>
            <span class="bat-pct">—</span>
          </span>
        </div>
        <div class="pill" id="clock">
          <span class="time">--:--</span>
          <span class="sep"></span>
          <span class="date">---</span>
        </div>
      </div>
    </div>
  </body>
</html>
